<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 660" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Mirobody v2 architecture: Clients, C++ Engine core (agent, MCP tools, LLM clients), FHIR R4 and terminology, Health data sources (vendors), Runtime and infrastructure">
  <style>
    :root{
      --ink:#0f172a; --sub:#475569; --box:#ffffff; --boxln:#e2e8f0;
      --flow:#2563eb; --flowln:#93c5fd; --num:#94a3b8;
    }
    .l1{--c:#6366f1} .l2{--c:#2563eb} .l3{--c:#0891b2} .l4{--c:#059669} .l5{--c:#64748b}
    @media (prefers-color-scheme: dark){
      :root{ --ink:#e8edf5; --sub:#9aa7bd; --box:#0e1726; --boxln:#26334a;
             --flow:#60a5fa; --flowln:#3b5170; --num:#5b6b86; }
      .l1{--c:#818cf8} .l2{--c:#60a5fa} .l3{--c:#22d3ee} .l4{--c:#34d399} .l5{--c:#94a3b8}
    }
    .band{fill:var(--c);opacity:.06}
    .bar{fill:var(--c)}
    .box{fill:var(--box);stroke:var(--boxln);stroke-width:1}
    .chip{fill:var(--c);opacity:.1}
    .lname{fill:var(--ink);font-size:15px;font-weight:700}
    .lnum{fill:var(--num);font-size:12px;font-weight:700;letter-spacing:.08em}
    .h{fill:var(--ink);font-size:13px;font-weight:650}
    .s{fill:var(--sub);font-size:10.5px}
    .tag{fill:var(--c);font-size:10.5px;font-weight:650}
    .flowlbl{fill:var(--flow);font-size:10.5px;font-weight:600}
    .flow{stroke:var(--flow);stroke-width:1.6;fill:none}
    .flowhead{fill:var(--flow)}
  </style>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="flowhead"/>
    </marker>
  </defs>

  <!-- ================= Layer 1 — Clients ================= -->
  <g class="l1">
    <rect class="band" x="16" y="16" width="1028" height="92" rx="14"/>
    <rect class="bar" x="16" y="16" width="5" height="92" rx="2.5"/>
    <text class="lnum" x="40" y="50">01</text>
    <text class="lname" x="40" y="70">Clients &amp;</text>
    <text class="lname" x="40" y="88">Interfaces</text>

    <g transform="translate(210,30)">
      <rect class="box" width="248" height="64" rx="10"/>
      <text class="h" x="20" y="28">Web &amp; Mobile App</text>
      <text class="s" x="20" y="46">self-hosted · on-device (Android / iOS)</text>
    </g>
    <g transform="translate(486,30)">
      <rect class="box" width="248" height="64" rx="10"/>
      <text class="h" x="20" y="28">ChatGPT Apps · Claude</text>
      <text class="s" x="20" y="46">Cursor · IDE assistants</text>
    </g>
    <g transform="translate(762,30)">
      <rect class="box" width="262" height="64" rx="10"/>
      <text class="h" x="20" y="28">Any MCP Client</text>
      <text class="s" x="20" y="46">JSON-RPC 2.0 over MCP</text>
    </g>
  </g>

  <!-- flow: clients -> engine -->
  <line class="flow" x1="334" y1="108" x2="334" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="344" y="124">HTTP / SSE · WS</text>
  <line class="flow" x1="610" y1="108" x2="610" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="620" y="124">MCP</text>
  <line class="flow" x1="893" y1="108" x2="893" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="903" y="124">OAuth 2.0</text>

  <!-- ================= Layer 2 — C++ Engine core ================= -->
  <g class="l2">
    <rect class="band" x="16" y="136" width="1028" height="158" rx="14"/>
    <rect class="bar" x="16" y="136" width="5" height="158" rx="2.5"/>
    <text class="lnum" x="40" y="172">02</text>
    <text class="lname" x="40" y="192">C++ Engine</text>
    <text class="lname" x="40" y="210">(one core)</text>

    <!-- left column: chat + agent + mcp -->
    <g transform="translate(210,150)">
      <rect class="box" width="384" height="130" rx="10"/>
      <text class="h" x="18" y="26">Chat &amp; Agent</text>
      <text class="s" x="18" y="43">src/chat · sessions · history · streaming</text>
      <rect class="chip" x="14" y="56" width="356" height="30" rx="7"/>
      <text class="h" x="26" y="75" font-size="12">one agent — pick provider → prompt → stream</text>
      <text class="h" x="18" y="108">MCP Server</text>
      <text class="s" x="18" y="123">src/mcp · /mcp · JSON-RPC 2.0 · discovers tools</text>
    </g>

    <!-- right column: llm clients + tools -->
    <g transform="translate(626,150)">
      <rect class="box" width="398" height="130" rx="10"/>
      <text class="h" x="18" y="26">LLM Clients</text>
      <text class="s" x="18" y="43">src/llm · OpenAI · Gemini · MiroThinker · on-device Gemma</text>
      <line x1="14" y1="56" x2="384" y2="56" stroke="var(--boxln)"/>
      <text class="tag" x="18" y="78">MCP tools</text><text class="s" x="86" y="78">files · family health · charts · memory</text>
      <text class="tag" x="18" y="98">Realtime</text><text class="s" x="86" y="98">OpenAI Realtime · Gemini Live (voice)</text>
      <text class="tag" x="18" y="118">One core</text><text class="s" x="86" y="118">plain extern "C" ABI · standalone / mobile</text>
    </g>
  </g>

  <!-- flow engine <-> fhir -->
  <line class="flow" x1="401" y1="294" x2="401" y2="316" marker-end="url(#ar)" marker-start="url(#ar)"/>
  <text class="flowlbl" x="411" y="309">read / write FHIR resources</text>

  <!-- ================= Layer 3 — FHIR R4 & terminology ================= -->
  <g class="l3">
    <rect class="band" x="16" y="320" width="1028" height="96" rx="14"/>
    <rect class="bar" x="16" y="320" width="5" height="96" rx="2.5"/>
    <text class="lnum" x="40" y="356">03</text>
    <text class="lname" x="40" y="376">FHIR R4 &amp;</text>
    <text class="lname" x="40" y="394">Terminology</text>

    <text class="tag" x="210" y="344">src/fhir — embedded FHIR R4 endpoint · units normalized to UCUM · mapped to standard vocabularies</text>
    <g transform="translate(210,352)" font-size="11">
      <g><rect class="box" width="150" height="48" rx="9"/><text class="h" x="75" y="22" text-anchor="middle" font-size="12">FHIR R4</text><text class="s" x="75" y="38" text-anchor="middle">resources</text></g>
      <g transform="translate(170,0)"><rect class="box" width="150" height="48" rx="9"/><text class="h" x="75" y="22" text-anchor="middle" font-size="12">LOINC</text><text class="s" x="75" y="38" text-anchor="middle">labs / vitals</text></g>
      <g transform="translate(340,0)"><rect class="box" width="150" height="48" rx="9"/><text class="h" x="75" y="22" text-anchor="middle" font-size="12">SNOMED CT</text><text class="s" x="75" y="38" text-anchor="middle">clinical terms</text></g>
      <g transform="translate(510,0)"><rect class="box" width="150" height="48" rx="9"/><text class="h" x="75" y="22" text-anchor="middle" font-size="12">RxNorm</text><text class="s" x="75" y="38" text-anchor="middle">medications</text></g>
      <g transform="translate(680,0)"><rect class="box" width="150" height="48" rx="9"/><text class="h" x="75" y="22" text-anchor="middle" font-size="12">UCUM</text><text class="s" x="75" y="38" text-anchor="middle">units</text></g>
    </g>
  </g>

  <!-- flow sources -> fhir -->
  <line class="flow" x1="640" y1="416" x2="640" y2="442" marker-end="url(#ar)"/>
  <text class="flowlbl" x="650" y="433">Observations (on-device POST) · parsed files</text>

  <!-- ================= Layer 4 — Health data sources (vendors) ================= -->
  <g class="l4">
    <rect class="band" x="16" y="446" width="1028" height="110" rx="14"/>
    <rect class="bar" x="16" y="446" width="5" height="110" rx="2.5"/>
    <text class="lnum" x="40" y="486">04</text>
    <text class="lname" x="40" y="506">Health Data</text>
    <text class="lname" x="40" y="524">(vendors)</text>

    <text class="tag" x="210" y="462">src/health/vendor — one vendor per source (authorize · fetch · webhook) · file upload (PDF / CSV / image) parsed to FHIR</text>
    <g transform="translate(210,470)">
      <rect class="box" width="195" height="70" rx="10"/>
      <text class="h" x="16" y="24">Platforms</text>
      <text class="s" x="16" y="42">Terra · Validic · Human API</text>
      <text class="s" x="16" y="58">15 B2B aggregators</text>
    </g>
    <g transform="translate(423,470)">
      <rect class="box" width="195" height="70" rx="10"/>
      <text class="h" x="16" y="24">Device brands</text>
      <text class="s" x="16" y="42">Fitbit · Garmin · Withings</text>
      <text class="s" x="16" y="58">first-party OAuth clients</text>
    </g>
    <g transform="translate(636,470)">
      <rect class="box" width="195" height="70" rx="10"/>
      <text class="h" x="16" y="24">Clinical EHRs</text>
      <text class="s" x="16" y="42">SMART on FHIR</text>
      <text class="s" x="16" y="58">Epic · Cerner · athenahealth</text>
    </g>
    <g transform="translate(849,470)">
      <rect class="box" width="195" height="70" rx="10"/>
      <text class="h" x="16" y="24">On-device stores</text>
      <text class="s" x="16" y="42">Apple Health · Health Connect</text>
      <text class="s" x="16" y="58">read on-device → POST FHIR</text>
    </g>
  </g>

  <!-- ================= Layer 5 — Runtime & Infrastructure ================= -->
  <g class="l5">
    <rect class="band" x="16" y="568" width="1028" height="78" rx="14"/>
    <rect class="bar" x="16" y="568" width="5" height="78" rx="2.5"/>
    <text class="lnum" x="40" y="600">05</text>
    <text class="lname" x="40" y="620">Runtime</text>

    <g transform="translate(210,582)" font-size="11">
      <g><rect class="box" width="176" height="50" rx="9"/><text class="h" x="14" y="22">PostgreSQL / SQLite</text><text class="s" x="14" y="39">desktop / mobile default</text></g>
      <g transform="translate(188,0)"><rect class="box" width="150" height="50" rx="9"/><text class="h" x="14" y="22">Redis / in-memory</text><text class="s" x="14" y="39">cache</text></g>
      <g transform="translate(350,0)"><rect class="box" width="192" height="50" rx="9"/><text class="h" x="14" y="22">Storage</text><text class="s" x="14" y="39">Local · S3 · Aliyun OSS · Azure</text></g>
      <g transform="translate(554,0)"><rect class="box" width="120" height="50" rx="9"/><text class="h" x="14" y="22">OAuth 2.0</text><text class="s" x="14" y="39">OIDC · JWT</text></g>
      <g transform="translate(686,0)"><rect class="box" width="152" height="50" rx="9"/><text class="h" x="14" y="22">3 forms</text><text class="s" x="14" y="39">binary · Android · iOS</text></g>
    </g>
  </g>
</svg>
