<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 130" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" role="img" aria-label="WebSocket upload: connect with token, upload_start, upload_chunk repeated, file_received, processing, upload_completed">
  <style>
    :root{ --ink:#0f172a; --sub:#64748b; --c:#2563eb; --box:#ffffff; --boxln:#dbe3ee; --loop:#94a3b8; }
    @media (prefers-color-scheme: dark){ :root{ --ink:#e8edf5; --sub:#9aa7bd; --c:#60a5fa; --box:#0e1726; --boxln:#26334a; --loop:#5b6b86; } }
    .box{fill:var(--box);stroke:var(--boxln);stroke-width:1.2}
    .n{fill:var(--ink);font-size:12px;font-weight:600;text-anchor:middle}
    .s{fill:var(--sub);font-size:9.5px;text-anchor:middle}
    .fl{stroke:var(--c);stroke-width:1.6;fill:none}
    .hd{fill:var(--c)}
    .lp{stroke:var(--loop);stroke-width:1.3;fill:none;stroke-dasharray:4 3}
    .lpt{fill:var(--loop);font-size:9.5px;text-anchor:middle}
    .hdl{fill:var(--loop)}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="hd"/></marker>
    <marker id="al" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="hdl"/></marker>
  </defs>
  <g>
    <rect class="box" x="16"  y="46" width="146" height="50" rx="9"/><text class="n" x="89"  y="68">Connect</text><text class="s" x="89"  y="84">WS + token</text>
    <rect class="box" x="178" y="46" width="146" height="50" rx="9"/><text class="n" x="251" y="68">upload_start</text><text class="s" x="251" y="84">file info</text>
    <rect class="box" x="340" y="46" width="146" height="50" rx="9"/><text class="n" x="413" y="68">upload_chunk</text><text class="s" x="413" y="84">base64</text>
    <rect class="box" x="502" y="46" width="150" height="50" rx="9"/><text class="n" x="577" y="68">file_received</text><text class="s" x="577" y="84">all chunks in</text>
    <rect class="box" x="668" y="46" width="146" height="50" rx="9"/><text class="n" x="741" y="68">Processing</text><text class="s" x="741" y="84">OCR · parse</text>
    <rect class="box" x="830" y="46" width="154" height="50" rx="9"/><text class="n" x="907" y="68">upload_completed</text><text class="s" x="907" y="84">indicators</text>
  </g>
  <line class="fl" x1="162" y1="71" x2="176" y2="71" marker-end="url(#a)"/>
  <line class="fl" x1="324" y1="71" x2="338" y2="71" marker-end="url(#a)"/>
  <line class="fl" x1="486" y1="71" x2="500" y2="71" marker-end="url(#a)"/>
  <line class="fl" x1="652" y1="71" x2="666" y2="71" marker-end="url(#a)"/>
  <line class="fl" x1="814" y1="71" x2="828" y2="71" marker-end="url(#a)"/>
  <!-- chunk repeat loop on node 3 -->
  <path class="lp" d="M380,46 C386,22 440,22 446,46" marker-end="url(#al)"/>
  <text class="lpt" x="413" y="18">repeat ×N</text>
</svg>
