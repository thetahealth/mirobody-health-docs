<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 660" font-family="ui-sans-serif, system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif" role="img" aria-label="Mirobody 架构：客户端、AI 与智能体引擎、FHIR 与健康标准、健康数据管线 (Pulse)、基础设施">
  <style>
    :root{
      --ink:#0f172a; --sub:#475569; --box:#ffffff; --boxln:#e2e8f0;
      --flow:#2563eb; --num:#94a3b8;
    }
    .l1{--c:#6366f1} .l2{--c:#2563eb} .l3{--c:#0891b2} .l4{--c:#059669} .l5{--c:#64748b}
    @media (prefers-color-scheme: dark){
      :root{ --ink:#e8edf5; --sub:#9aa7bd; --box:#0e1726; --boxln:#26334a;
             --flow:#60a5fa; --num:#5b6b86; }
      .l1{--c:#818cf8} .l2{--c:#60a5fa} .l3{--c:#22d3ee} .l4{--c:#34d399} .l5{--c:#94a3b8}
    }
    .band{fill:var(--c);opacity:.06}
    .bar{fill:var(--c)}
    .box{fill:var(--box);stroke:var(--boxln);stroke-width:1}
    .chip{fill:var(--c);opacity:.1}
    .lname{fill:var(--ink);font-size:15px;font-weight:700}
    .lnum{fill:var(--num);font-size:12px;font-weight:700;letter-spacing:.08em}
    .h{fill:var(--ink);font-size:13px;font-weight:650}
    .s{fill:var(--sub);font-size:10.5px}
    .tag{fill:var(--c);font-size:10.5px;font-weight:650}
    .flowlbl{fill:var(--flow);font-size:10.5px;font-weight:600}
    .flow{stroke:var(--flow);stroke-width:1.6;fill:none}
    .flowhead{fill:var(--flow)}
  </style>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="flowhead"/>
    </marker>
  </defs>

  <!-- Layer 1 — Clients -->
  <g class="l1">
    <rect class="band" x="16" y="16" width="1028" height="92" rx="14"/>
    <rect class="bar" x="16" y="16" width="5" height="92" rx="2.5"/>
    <text class="lnum" x="40" y="50">01</text>
    <text class="lname" x="40" y="74">客户端</text>
    <text class="lname" x="40" y="92">与接口</text>

    <g transform="translate(210,30)">
      <rect class="box" width="248" height="64" rx="10"/>
      <text class="h" x="20" y="28">Web 与移动应用</text>
      <text class="s" x="20" y="46">自托管 + mirobody.ai</text>
    </g>
    <g transform="translate(486,30)">
      <rect class="box" width="248" height="64" rx="10"/>
      <text class="h" x="20" y="28">ChatGPT Apps · Claude</text>
      <text class="s" x="20" y="46">Cursor · IDE 助手</text>
    </g>
    <g transform="translate(762,30)">
      <rect class="box" width="262" height="64" rx="10"/>
      <text class="h" x="20" y="28">任意 MCP 客户端</text>
      <text class="s" x="20" y="46">基于 MCP 的 JSON-RPC 2.0</text>
    </g>
  </g>

  <line class="flow" x1="334" y1="108" x2="334" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="344" y="124">HTTP / SSE</text>
  <line class="flow" x1="610" y1="108" x2="610" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="620" y="124">MCP</text>
  <line class="flow" x1="893" y1="108" x2="893" y2="132" marker-end="url(#ar)"/>
  <text class="flowlbl" x="903" y="124">OAuth 2.0</text>

  <!-- Layer 2 — AI and Agent Engine -->
  <g class="l2">
    <rect class="band" x="16" y="136" width="1028" height="158" rx="14"/>
    <rect class="bar" x="16" y="136" width="5" height="158" rx="2.5"/>
    <text class="lnum" x="40" y="172">02</text>
    <text class="lname" x="40" y="196">AI 与</text>
    <text class="lname" x="40" y="214">智能体引擎</text>

    <g transform="translate(210,150)">
      <rect class="box" width="384" height="130" rx="10"/>
      <text class="h" x="18" y="26">对话服务</text>
      <text class="s" x="18" y="43">会话 · 历史 · 流式 · 分享</text>
      <rect class="chip" x="14" y="56" width="356" height="30" rx="7"/>
      <text class="h" x="26" y="75" font-size="12">DeepAgent · MixAgent · BaseAgent</text>
      <text class="h" x="18" y="108">MCP 服务器</text>
      <text class="s" x="18" y="123">自动发现工具与资源</text>
    </g>

    <g transform="translate(626,150)">
      <rect class="box" width="398" height="130" rx="10"/>
      <text class="h" x="18" y="26">LLM 客户端</text>
      <text class="s" x="18" y="43">OpenAI · Gemini · Anthropic · Volcengine · Dashscope</text>
      <line x1="14" y1="56" x2="384" y2="56" stroke="var(--boxln)"/>
      <text class="tag" x="18" y="78">工具</text><text class="s" x="58" y="78">文件操作 · 图表 · execute</text>
      <text class="tag" x="18" y="98">技能</text><text class="s" x="58" y="98">SKILL.md 手册，启动时自动加载</text>
      <text class="tag" x="18" y="118">向量 · 提示词</text><text class="s" x="118" y="118">pgvector · Jinja2 上下文</text>
    </g>
  </g>

  <line class="flow" x1="401" y1="294" x2="401" y2="316" marker-end="url(#ar)"/>
  <text class="flowlbl" x="411" y="309">解析 / 检索指标</text>

  <!-- Layer 3 — FHIR and Standards -->
  <g class="l3">
    <rect class="band" x="16" y="320" width="1028" height="96" rx="14"/>
    <rect class="bar" x="16" y="320" width="5" height="96" rx="2.5"/>
    <text class="lnum" x="40" y="356">03</text>
    <text class="lname" x="40" y="380">FHIR</text>
    <text class="lname" x="40" y="398">与标准</text>

    <text class="tag" x="210" y="344">400+ 标准指标 · 跨词表概念图谱</text>
    <g transform="translate(210,352)" font-size="11">
      <g><rect class="box" width="108" height="48" rx="9"/><text class="h" x="54" y="22" text-anchor="middle" font-size="12">FHIR</text><text class="s" x="54" y="38" text-anchor="middle">R4 / R5</text></g>
      <g transform="translate(120,0)"><rect class="box" width="108" height="48" rx="9"/><text class="h" x="54" y="22" text-anchor="middle" font-size="12">LOINC</text><text class="s" x="54" y="38" text-anchor="middle">化验 / 体征</text></g>
      <g transform="translate(240,0)"><rect class="box" width="116" height="48" rx="9"/><text class="h" x="58" y="22" text-anchor="middle" font-size="12">SNOMED CT</text><text class="s" x="58" y="38" text-anchor="middle">临床术语</text></g>
      <g transform="translate(368,0)"><rect class="box" width="108" height="48" rx="9"/><text class="h" x="54" y="22" text-anchor="middle" font-size="12">RxNorm</text><text class="s" x="54" y="38" text-anchor="middle">用药</text></g>
      <g transform="translate(488,0)"><rect class="box" width="92" height="48" rx="9"/><text class="h" x="46" y="22" text-anchor="middle" font-size="12">CVX</text><text class="s" x="46" y="38" text-anchor="middle">疫苗</text></g>
      <g transform="translate(592,0)"><rect class="box" width="92" height="48" rx="9"/><text class="h" x="46" y="22" text-anchor="middle" font-size="12">DCM</text><text class="s" x="46" y="38" text-anchor="middle">影像</text></g>
      <g transform="translate(696,0)"><rect class="box" width="118" height="48" rx="9"/><text class="h" x="59" y="22" text-anchor="middle" font-size="12">单位归一</text><text class="s" x="59" y="38" text-anchor="middle">UCUM · 8 语言</text></g>
    </g>
  </g>

  <line class="flow" x1="640" y1="416" x2="640" y2="442" marker-end="url(#ar)" marker-start="url(#ar)"/>
  <text class="flowlbl" x="650" y="433">标准化序列</text>

  <!-- Layer 4 — Health Data Pipeline (Pulse) -->
  <g class="l4">
    <rect class="band" x="16" y="446" width="1028" height="110" rx="14"/>
    <rect class="bar" x="16" y="446" width="5" height="110" rx="2.5"/>
    <text class="lnum" x="40" y="486">04</text>
    <text class="lname" x="40" y="510">数据管线</text>
    <text class="lname" x="40" y="528">(Pulse)</text>

    <g transform="translate(210,462)">
      <rect class="box" width="210" height="78" rx="10"/>
      <text class="h" x="16" y="24">数据源</text>
      <text class="s" x="16" y="42">300+ 可穿戴 · EHR</text>
      <text class="s" x="16" y="58">文件上传（PDF/CSV/音频）</text>
      <text class="s" x="16" y="72" fill="var(--c)">基因 · Apple Health</text>
    </g>
    <line class="flow" x1="424" y1="501" x2="452" y2="501" marker-end="url(#ar)"/>
    <g transform="translate(454,462)">
      <rect class="box" width="170" height="78" rx="10"/>
      <text class="h" x="16" y="24">解析与抽取</text>
      <text class="s" x="16" y="42">OCR · ASR</text>
      <text class="s" x="16" y="58">LLM 指标</text>
      <text class="s" x="16" y="72">抽取</text>
    </g>
    <line class="flow" x1="628" y1="501" x2="656" y2="501" marker-end="url(#ar)"/>
    <g transform="translate(658,462)">
      <rect class="box" width="158" height="78" rx="10"/>
      <text class="h" x="16" y="24">聚合</text>
      <text class="s" x="16" y="42">每日汇总</text>
      <text class="s" x="16" y="58">衍生指标</text>
    </g>
    <line class="flow" x1="820" y1="501" x2="848" y2="501" marker-end="url(#ar)"/>
    <g transform="translate(850,462)">
      <rect class="box" width="174" height="78" rx="10"/>
      <text class="h" x="16" y="24">洞察</text>
      <text class="s" x="16" y="42">趋势 · 异常</text>
      <text class="s" x="16" y="58">模式识别</text>
    </g>
  </g>

  <!-- Layer 5 — Infrastructure -->
  <g class="l5">
    <rect class="band" x="16" y="568" width="1028" height="78" rx="14"/>
    <rect class="bar" x="16" y="568" width="5" height="78" rx="2.5"/>
    <text class="lnum" x="40" y="600">05</text>
    <text class="lname" x="40" y="620">基础设施</text>

    <g transform="translate(210,582)" font-size="11">
      <g><rect class="box" width="132" height="50" rx="9"/><text class="h" x="14" y="22">Starlette ASGI</text><text class="s" x="14" y="39">JWT · 限流</text></g>
      <g transform="translate(144,0)"><rect class="box" width="150" height="50" rx="9"/><text class="h" x="14" y="22">PostgreSQL</text><text class="s" x="14" y="39">+ pgvector</text></g>
      <g transform="translate(306,0)"><rect class="box" width="104" height="50" rx="9"/><text class="h" x="14" y="22">Redis</text><text class="s" x="14" y="39">缓存 · 队列</text></g>
      <g transform="translate(422,0)"><rect class="box" width="160" height="50" rx="9"/><text class="h" x="14" y="22">存储</text><text class="s" x="14" y="39">本地 · S3 · 阿里云 OSS</text></g>
      <g transform="translate(594,0)"><rect class="box" width="124" height="50" rx="9"/><text class="h" x="14" y="22">鉴权</text><text class="s" x="14" y="39">OAuth · WebAuthn</text></g>
      <g transform="translate(730,0)"><rect class="box" width="84" height="50" rx="9"/><text class="h" x="14" y="22">E2B</text><text class="s" x="14" y="39">沙箱</text></g>
    </g>
  </g>
</svg>
