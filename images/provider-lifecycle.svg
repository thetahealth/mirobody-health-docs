<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 150" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" role="img" aria-label="Provider lifecycle: Discovered, Validated, Registered, Active, Linked, Syncing">
  <style>
    :root{ --ink:#0f172a; --sub:#64748b; --box:#ffffff; --boxln:#dbe3ee; --c:#2563eb; --loop:#94a3b8; }
    @media (prefers-color-scheme: dark){
      :root{ --ink:#e8edf5; --sub:#9aa7bd; --box:#0e1726; --boxln:#26334a; --c:#60a5fa; --loop:#5b6b86; }
    }
    .box{fill:var(--box);stroke:var(--c);stroke-width:1.4}
    .n{fill:var(--ink);font-size:13px;font-weight:650;text-anchor:middle}
    .e{fill:var(--sub);font-size:10px;text-anchor:middle}
    .fl{stroke:var(--c);stroke-width:1.6;fill:none}
    .lp{stroke:var(--loop);stroke-width:1.4;fill:none;stroke-dasharray:4 3}
    .lpt{fill:var(--loop);font-size:10px;text-anchor:middle}
    .hd{fill:var(--c)}
    .hdl{fill:var(--loop)}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="hd"/></marker>
    <marker id="al" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="hdl"/></marker>
  </defs>

  <!-- 6 states, evenly spaced -->
  <!-- positions: x = 20, 178, 336, 494, 652, 810 ; w=140 ; cy=70 -->
  <g>
    <rect class="box" x="20"  y="50" width="140" height="40" rx="9"/><text class="n" x="90"  y="75">Discovered</text>
    <rect class="box" x="178" y="50" width="140" height="40" rx="9"/><text class="n" x="248" y="75">Validated</text>
    <rect class="box" x="336" y="50" width="140" height="40" rx="9"/><text class="n" x="406" y="75">Registered</text>
    <rect class="box" x="494" y="50" width="140" height="40" rx="9"/><text class="n" x="564" y="75">Active</text>
    <rect class="box" x="652" y="50" width="140" height="40" rx="9"/><text class="n" x="722" y="75">Linked</text>
    <rect class="box" x="810" y="50" width="150" height="40" rx="9"/><text class="n" x="885" y="75">Syncing</text>
  </g>

  <!-- forward arrows + edge labels -->
  <line class="fl" x1="160" y1="70" x2="176" y2="70" marker-end="url(#a)"/><text class="e" x="168" y="42">scan</text>
  <line class="fl" x1="318" y1="70" x2="334" y2="70" marker-end="url(#a)"/><text class="e" x="326" y="42">validate</text>
  <line class="fl" x1="476" y1="70" x2="492" y2="70" marker-end="url(#a)"/><text class="e" x="484" y="42">register</text>
  <line class="fl" x1="634" y1="70" x2="650" y2="70" marker-end="url(#a)"/><text class="e" x="642" y="42">connect · OAuth</text>
  <line class="fl" x1="792" y1="70" x2="808" y2="70" marker-end="url(#a)"/><text class="e" x="800" y="42">pull</text>

  <!-- syncing loops back to linked (continuous) -->
  <path class="lp" d="M810,84 C770,118 762,118 722,92" marker-end="url(#al)"/>
  <text class="lpt" x="766" y="128">continuous sync</text>

  <!-- unlink: linked back to active -->
  <path class="lp" d="M652,60 C600,28 616,28 564,52" marker-end="url(#al)"/>
  <text class="lpt" x="608" y="20">unlink → re-link</text>
</svg>
